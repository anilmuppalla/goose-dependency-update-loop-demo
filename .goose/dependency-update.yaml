version: "1.0.0"
title: "Bounded MSW dependency update repair"
description: >-
  Repair the frozen MSW 1.x to 2.x handler migration within one tracked file.
  Two retries permit up to three attempts total.
prompt: |
  The immutable dependency upgrade from MSW 1.3.2 to 2.0.0 fails type-checking.

  Read these local files in order:
  1. AGENTS.md
  2. artifacts/baseline.log
  3. docs/msw-1-to-2-migration-notes.md
  4. test/handlers.ts

  Do not fetch migration documentation or other context from the network.
  Diagnose the documented API break and make the smallest allowed repair.
  Only test/handlers.ts may change.

  Write artifacts/goose-summary.md with the diagnosis, changed file, commands
  run, validation result, and remaining risk. If the repair needs any other
  tracked file or facts outside the frozen note, write NEEDS_HUMAN and stop.

  The retry budget is two retries, so the loop has at most three attempts total.
instructions: |
  Follow AGENTS.md exactly. Preserve the dependency update and every check.
  Never change package manifests, tests outside test/handlers.ts, configuration,
  workflows, instructions, the recipe, or migration context. Never commit,
  push, open a pull request, merge, publish, or deploy. Do not claim success
  unless every deterministic check passes.
extensions:
  - type: builtin
    name: developer
retry:
  max_retries: 2
  timeout_seconds: 300
  checks:
    - type: shell
      command: "npm run check"
    - type: shell
      command: 'test "$(git diff --name-only "$TARGET_SHA")" = "test/handlers.ts"'
    - type: shell
      command: "test -z \"$(git ls-files --others --exclude-standard)\""
    - type: shell
      command: "test -s artifacts/goose-summary.md"
  on_failure: >-
    mkdir -p artifacts; printf '\n[%s] validation failed\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> artifacts/validation.log; npm run check >> artifacts/validation.log 2>&1 || true
settings:
  max_turns: 20
