name: Goose repair loop

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write
  contents: write

concurrency:
  group: goose-repair-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  repair:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'demo/') &&
      (github.event.workflow_run.event == 'pull_request' ||
       github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out the failed branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: npm

      - name: Stop a runaway outer loop
        run: |
          attempts="$(git log origin/main..HEAD --format=%s | grep -c '^fix(goose):' || true)"
          if [ "$attempts" -ge 3 ]; then
            echo "::error::Goose already pushed three repair commits"
            exit 1
          fi

      - name: Install dependencies and capture the CI failure
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          npm ci --ignore-scripts
          gh run view "$FAILED_RUN_ID" --log-failed > .goose-ci-failure.log
          test -s .goose-ci-failure.log

      - name: Install pinned Goose 1.36.0
        run: |
          archive="$RUNNER_TEMP/goose-x86_64-unknown-linux-gnu.tar.bz2"
          install_dir="$RUNNER_TEMP/goose-bin"
          url="https://github.com/aaif-goose/goose/releases/download/v1.36.0/goose-x86_64-unknown-linux-gnu.tar.bz2"
          expected_sha256="e679afee737d28fa0f66bfde821522dc898e3c52cafd534909652e73ad8df267"

          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$url" --output "$archive"
          printf '%s  %s\n' "$expected_sha256" "$archive" | sha256sum --check -
          mkdir -p "$install_dir"
          tar -xjf "$archive" -C "$install_dir"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run the bounded Goose loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOSE_PROVIDER: openai
          GOOSE_MODEL: ${{ vars.GOOSE_MODEL }}
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GOOSE_DISABLE_KEYRING: "1"
          GOOSE_TELEMETRY_ENABLED: "false"
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$GOOSE_MODEL"
          goose recipe validate .goose/dependency-update.yaml
          goose run --no-session --recipe .goose/dependency-update.yaml

      - name: Verify and push the repair
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          npm run check

          if [ -n "$(git status --porcelain -- .github .goose)" ]; then
            echo "::error::Goose changed its own control files"
            exit 1
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::Goose produced no repair"
            exit 1
          fi

          git config user.name "goose-ci[bot]"
          git config user.email "goose-ci[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(goose): repair failed CI"
          git push origin "HEAD:$HEAD_BRANCH"

          # GITHUB_TOKEN pushes do not start workflows, so dispatch CI explicitly.
          gh workflow run ci.yml --ref "$HEAD_BRANCH"
