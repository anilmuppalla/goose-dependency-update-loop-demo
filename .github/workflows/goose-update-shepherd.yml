name: Goose repair loop

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: goose-repair-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  repair:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event == 'pull_request' ||
       github.event.workflow_run.event == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Find the failed pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          test "$HEAD_REPOSITORY" = "$GITHUB_REPOSITORY"
          if [[ ! "$TARGET_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::CI did not provide a full head SHA"
            exit 1
          fi

          if [ "$RUN_EVENT" = "pull_request" ]; then
            count="$(jq '.workflow_run.pull_requests | length' "$GITHUB_EVENT_PATH")"
            test "$count" -eq 1
            pr_number="$(jq -r '.workflow_run.pull_requests[0].number' "$GITHUB_EVENT_PATH")"
          else
            owner="${GITHUB_REPOSITORY%%/*}"
            prs="$RUNNER_TEMP/pulls.json"
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/pulls?state=open&base=main&head=$owner:$HEAD_BRANCH&per_page=100" \
              > "$prs"
            test "$(jq 'length' "$prs")" -eq 1
            pr_number="$(jq -r '.[0].number' "$prs")"
          fi

          pr="$RUNNER_TEMP/pull-request.json"
          gh api "repos/$GITHUB_REPOSITORY/pulls/$pr_number" > "$pr"
          test "$(jq -r '.state' "$pr")" = "open"
          test "$(jq -r '.base.ref' "$pr")" = "main"
          test "$(jq -r '.head.repo.full_name' "$pr")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.head.ref' "$pr")" = "$HEAD_BRANCH"
          test "$(jq -r '.head.sha' "$pr")" = "$TARGET_SHA"

          {
            printf 'number=%s\n' "$pr_number"
            printf 'branch=%s\n' "$HEAD_BRANCH"
            printf 'sha=%s\n' "$TARGET_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Check out the failed branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
          cache: npm

      - name: Stop a runaway outer loop
        run: |
          attempts="$(git log origin/main..HEAD --format=%s | grep -c '^fix(goose):' || true)"
          if [ "$attempts" -ge 3 ]; then
            echo "::error::Goose already pushed three repair commits"
            exit 1
          fi

      - name: Install dependencies and capture the CI failure
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          npm ci --ignore-scripts
          gh run view "$FAILED_RUN_ID" --log-failed > .goose-ci-failure.log
          test -s .goose-ci-failure.log

      - name: Install pinned Goose 1.36.0
        run: |
          archive="$RUNNER_TEMP/goose-x86_64-unknown-linux-gnu.tar.bz2"
          install_dir="$RUNNER_TEMP/goose-bin"
          url="https://github.com/aaif-goose/goose/releases/download/v1.36.0/goose-x86_64-unknown-linux-gnu.tar.bz2"
          expected_sha256="e679afee737d28fa0f66bfde821522dc898e3c52cafd534909652e73ad8df267"

          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$url" --output "$archive"
          printf '%s  %s\n' "$expected_sha256" "$archive" | sha256sum --check -
          mkdir -p "$install_dir"
          tar -xjf "$archive" -C "$install_dir"
          test "$("$install_dir/goose" --version | tr -d '[:space:]')" = "1.36.0"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Run the bounded Goose loop
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOSE_PROVIDER: google
          GOOSE_MODEL: ${{ vars.GOOSE_MODEL }}
          GOOSE_MODE: auto
          GOOSE_MAX_TURNS: "20"
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GOOSE_DISABLE_KEYRING: "1"
          GOOSE_TELEMETRY_ENABLED: "false"
        run: |
          test -n "$GOOGLE_API_KEY"
          test -n "$GOOSE_MODEL"
          goose recipe validate .goose/dependency-update.yaml
          goose run --no-session --no-profile --recipe .goose/dependency-update.yaml

      - name: Verify and push the repair
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ steps.pr.outputs.branch }}
        run: |
          npm run check

          if [ -n "$(git status --porcelain -- .github .goose package.json package-lock.json)" ]; then
            echo "::error::Goose changed the loop or dependency update"
            exit 1
          fi
          if [ -z "$(git status --porcelain)" ]; then
            echo "::error::Goose produced no repair"
            exit 1
          fi

          git config user.name "goose-ci[bot]"
          git config user.email "goose-ci[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(goose): repair failed CI"
          git push origin "HEAD:$HEAD_BRANCH"

          # GITHUB_TOKEN pushes do not start workflows, so dispatch CI explicitly.
          gh workflow run ci.yml --ref "$HEAD_BRANCH"
